<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Receipts" />
  <title>Receipt Logger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 32px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 340px;
    }

    .btn {
      background: #1e1e1e;
      border: 1.5px solid #2e2e2e;
      border-radius: 16px;
      padding: 28px 16px;
      font-size: 1rem;
      font-weight: 500;
      color: #f0f0f0;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { background: #2a2a2a; border-color: #555; }

    .btn .icon { font-size: 2rem; }

    .btn.custom {
      grid-column: 1 / -1;
      flex-direction: row;
      padding: 20px 20px;
      gap: 14px;
    }

    .custom-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 1rem;
      color: #f0f0f0;
      font-family: inherit;
    }

    .custom-input::placeholder { color: #555; }

    .custom-go {
      background: #2e2e2e;
      border: none;
      border-radius: 10px;
      color: #aaa;
      font-size: 0.85rem;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn.saved {
      position: relative;
    }

    .btn-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #333;
      border: none;
      border-radius: 50%;
      color: #888;
      font-size: 0.7rem;
      width: 20px;
      height: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-delete:active { background: #555; color: #fff; }

    /* Preview overlay */
    .preview-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      flex-direction: column;
      z-index: 100;
    }

    .preview-overlay.show { display: flex; }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 52px 24px 16px;
      flex-shrink: 0;
    }

    .preview-category {
      font-size: 1rem;
      font-weight: 600;
      color: #f0f0f0;
    }

    .preview-cancel {
      background: none;
      border: none;
      color: #666;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
      padding: 4px 0;
    }

    .preview-img-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0 16px;
    }

    .preview-img-wrap img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
      object-fit: contain;
    }

    .preview-actions {
      padding: 24px 24px 48px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }

    .btn-log {
      background: #b5f23a;
      border: none;
      border-radius: 14px;
      color: #0a0a0a;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 18px;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-log:active { background: #9fd930; }

    .btn-retake {
      background: #1e1e1e;
      border: 1.5px solid #2e2e2e;
      border-radius: 14px;
      color: #aaa;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 16px;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-retake:active { background: #2a2a2a; }

    /* Success overlay */
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 200;
    }

    .success-overlay.show { display: flex; }

    .success-overlay .check { font-size: 3.5rem; }

    .success-overlay .label {
      font-size: 1.1rem;
      color: #bbb;
      text-align: center;
    }

    .success-overlay .sublabel {
      font-size: 0.85rem;
      color: #555;
      text-align: center;
      margin-top: -8px;
    }

    .success-overlay .dismiss {
      margin-top: 16px;
      background: #1e1e1e;
      border: 1.5px solid #333;
      border-radius: 12px;
      color: #aaa;
      font-size: 0.9rem;
      padding: 12px 32px;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>

  <h1>Log Receipt</h1>

  <div class="grid">
    <button class="btn" onclick="openCamera('Groceries', '🛒')">
      <span class="icon">🛒</span>
      Groceries
    </button>
    <button class="btn" onclick="openCamera('Fuel', '⛽')">
      <span class="icon">⛽</span>
      Fuel
    </button>
    <button class="btn" onclick="openCamera('Bills', '📄')">
      <span class="icon">📄</span>
      Bills
    </button>
    <button class="btn" onclick="openCamera('Misc', '📦')">
      <span class="icon">📦</span>
      Misc
    </button>

    <div id="savedCategories"></div>

    <div class="btn custom">
      <span class="icon">✏️</span>
      <input class="custom-input" id="customInput" type="text" placeholder="New category…" autocorrect="off" autocapitalize="words" />
      <button class="custom-go" onclick="saveCategory()">Add</button>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="cameraInput" accept="image/*" style="display:none" />

  <!-- Preview -->
  <div class="preview-overlay" id="previewOverlay">
    <div class="preview-header">
      <span class="preview-category" id="previewCategory"></span>
      <button class="preview-cancel" onclick="cancelPreview()">Cancel</button>
    </div>
    <div class="preview-img-wrap">
      <img id="previewImg" src="" alt="Receipt preview" />
    </div>
    <div class="preview-actions">
      <button class="btn-log" onclick="confirmLog()">Log It</button>
      <button class="btn-retake" onclick="retake()">Retake</button>
    </div>
  </div>

  <!-- Success -->
  <div class="success-overlay" id="successOverlay">
    <div class="check">✓</div>
    <div class="label" id="successLabel">Receipt logged</div>
    <div class="sublabel">Shortcut is saving to your vault.</div>
    <button class="dismiss" onclick="dismissSuccess()">Done</button>
  </div>

  <script>
    let pendingCategory = null;
    let pendingFilename = null;
    let pendingObjectURL = null;

    function openCamera(category) {
      pendingCategory = category;
      const input = document.getElementById('cameraInput');
      input.value = '';
      input.onchange = onPhotoSelected;
      input.click();
    }

    function onPhotoSelected(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (pendingObjectURL) URL.revokeObjectURL(pendingObjectURL);
      pendingObjectURL = URL.createObjectURL(file);

      const date = new Date().toISOString().split('T')[0];
      const ts = Date.now();
      const catId = pendingCategory.toLowerCase().replace(/\s+/g, '-');
      pendingFilename = `${date}_${catId}_${ts}.jpg`;

      document.getElementById('previewImg').src = pendingObjectURL;
      document.getElementById('previewCategory').textContent = pendingCategory;
      document.getElementById('previewOverlay').classList.add('show');
    }

    function confirmLog() {
      document.getElementById('previewOverlay').classList.remove('show');

      document.getElementById('successLabel').textContent = pendingCategory + ' receipt logged';
      document.getElementById('successOverlay').classList.add('show');

      const name = encodeURIComponent('Receipt - ' + pendingCategory);
      const input = encodeURIComponent(pendingFilename);
      setTimeout(() => {
        window.location.href = `shortcuts://run-shortcut?name=${name}&input=text&text=${input}`;
      }, 300);
    }

    function cancelPreview() {
      document.getElementById('previewOverlay').classList.remove('show');
      if (pendingObjectURL) {
        URL.revokeObjectURL(pendingObjectURL);
        pendingObjectURL = null;
      }
      pendingCategory = null;
      pendingFilename = null;
    }

    function retake() {
      document.getElementById('previewOverlay').classList.remove('show');
      openCamera(pendingCategory);
    }

    function dismissSuccess() {
      document.getElementById('successOverlay').classList.remove('show');
      if (pendingObjectURL) {
        URL.revokeObjectURL(pendingObjectURL);
        pendingObjectURL = null;
      }
      pendingCategory = null;
      pendingFilename = null;
    }

    function saveCategory() {
      const val = document.getElementById('customInput').value.trim();
      if (!val) return;
      const saved = getCategories();
      if (!saved.includes(val)) {
        saved.push(val);
        localStorage.setItem('customCategories', JSON.stringify(saved));
      }
      document.getElementById('customInput').value = '';
      renderCategories();
    }

    function deleteCategory(name) {
      const saved = getCategories().filter(c => c !== name);
      localStorage.setItem('customCategories', JSON.stringify(saved));
      renderCategories();
    }

    function getCategories() {
      try { return JSON.parse(localStorage.getItem('customCategories')) || []; }
      catch { return []; }
    }

    function renderCategories() {
      const container = document.getElementById('savedCategories');
      const saved = getCategories();
      container.innerHTML = saved.map(name => `
        <button class="btn saved" onclick="openCamera('${name.replace(/'/g, "\\'")}')">
          <button class="btn-delete" onclick="event.stopPropagation(); deleteCategory('${name.replace(/'/g, "\\'")}')">×</button>
          <span class="icon">🏷️</span>
          ${name}
        </button>
      `).join('');
    }

    document.getElementById('customInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveCategory();
    });

    renderCategories();
  </script>

</body>
</html>
